<!DOCTYPE html>
<html>
<head>
    <title>Doctor Appointment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eaf6ff;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
            color: #0077b6;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005f8a;
        }

        .doctor-card {
            background: #f1f9ff;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Doctor Appointment</h2>

    <div class="doctor-card">
        <b>Available Doctors:</b><br>
        👨‍⚕️ Dr. RAHIL PASHA SA<br>
        👩‍⚕️ Dr. ROUSHNI
    </div>

    <form>

        <label>Choose Doctor</label>
        <select>
            <option>Dr. RAHIL PASHA SA</option>
            <option>Dr. ROUSHNI</option>
        </select>

        <label>Patient Name</label>
        <input type="text" placeholder="Enter patient name" required>

        <label>Age</label>
        <input type="number" placeholder="Enter age" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>

        <label>Email</label>
        <input type="email" placeholder="Enter email">

        <label>Appointment Date</label>
        <input type="date" required>

        <label>Preferred Time</label>
        <select>
            <option>09:00 AM</option>
            <option>11:00 AM</option>
            <option>02:00 PM</option>
            <option>04:00 PM</option>
        </select>

        <label>Symptoms / Message</label>
        <textarea rows="4" placeholder="Describe your problem"></textarea>

        <button type="submit">Book Appointment</button>

    </form>

</div>

</body>
</html>
